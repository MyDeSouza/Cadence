<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="transparent" />
  <title>Cadence</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { border: none; background: none; cursor: pointer; font: inherit; }
    input  { border: none; outline: none; background: none; font: inherit; }

    /* ── Base ───────────────────────────────────────────────────────────────── */
    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }

    /* ── App shell ──────────────────────────────────────────────────────────── */
    #app {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      /* gradient applied by JS */
    }

    /* ── Flash overlay (green on swipe right) ──────────────────────────────── */
    #flash-overlay {
      position: fixed;
      inset: 0;
      background: rgba(200, 240, 96, 0.22);
      pointer-events: none;
      opacity: 0;
      z-index: 50;
      transition: opacity 0.15s ease;
    }

    /* ── Top section ────────────────────────────────────────────────────────── */
    #top-section {
      padding: calc(env(safe-area-inset-top, 44px) + 12px) 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    #cadence-mark {
      margin-bottom: 14px;
    }

    /* ── Context pills ──────────────────────────────────────────────────────── */
    #pills-row {
      display: flex;
      gap: 14px;
      margin-bottom: 22px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255, 255, 255, 0.08);
      padding: 8px 12px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 300;
      color: white;
      white-space: nowrap;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }

    .day-highlight {
      background: rgba(255, 255, 255, 0.32);
      padding: 4px 10px;
      border-radius: 16px;
      margin-left: 4px;
    }

    /* ── Greeting ───────────────────────────────────────────────────────────── */
    #greeting-block {
      align-self: stretch;
      padding: 0 4px;
    }

    #greeting {
      font-size: 32px;
      font-weight: 400;
      color: white;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    #subtitle {
      font-size: 16px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
    }

    /* ── Card area ──────────────────────────────────────────────────────────── */
    #card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 20px 120px;
      position: relative;
    }

    /* ── Card stack ─────────────────────────────────────────────────────────── */
    #card-stack {
      position: relative;
    }

    /* ── Signal card ────────────────────────────────────────────────────────── */
    .signal-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 64px;
      padding: 40px 32px 32px;
      min-height: 210px;
      box-shadow: 0px 0px 32px 0px rgba(0, 0, 0, 0.16);
      display: flex;
      flex-direction: column;
      gap: 0;
      will-change: transform;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Main card on top */
    #main-card {
      position: relative;
      z-index: 2;
    }

    /* Peek card behind */
    #peek-card {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1;
      transform: scale(0.96) translateY(12px);
      opacity: 0.6;
      pointer-events: none;
      transform-origin: center top;
    }

    /* card header row */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .cog-badge {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .cog-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cog-label {
      font-size: 11px;
      font-weight: 400;
      color: #888;
    }

    .source-badge {
      background: #f0f0f0;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 400;
      color: #888;
    }

    .card-title {
      font-size: 26px;
      font-weight: 600;
      color: #0a0a0a;
      line-height: 1.2;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-time {
      font-size: 14px;
      font-weight: 300;
      color: #888;
      margin-bottom: 6px;
    }

    .card-location {
      font-size: 12px;
      font-weight: 300;
      color: #aaa;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .score-track {
      margin-top: auto;
      padding-top: 20px;
      height: 23px; /* track 3px + 20px top padding */
      display: flex;
      align-items: flex-end;
    }

    .score-bar-bg {
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: #f0f0f0;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 3px;
      border-radius: 2px;
    }

    /* ── Gesture hints ──────────────────────────────────────────────────────── */
    #gesture-hints {
      text-align: center;
      margin-top: 18px;
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #gesture-hints.hidden {
      opacity: 0;
    }

    /* ── Empty state ────────────────────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 32px;
    }

    #empty-text {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
    }

    /* ── Input bar ──────────────────────────────────────────────────────────── */
    #input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      z-index: 40;
    }

    #input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(35, 54, 78, 0.32);
      border-radius: 24px;
      padding: 8px 12px;
    }

    .pin-icon {
      width: 12px;
      height: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .pin-circle {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.5);
    }

    .pin-tail {
      width: 1.5px;
      height: 6px;
      background: rgba(255, 255, 255, 0.5);
      margin-top: -1px;
    }

    #ask-input {
      flex: 1;
      font-size: 16px;
      font-weight: 400;
      color: white;
    }

    #ask-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    #mic-btn {
      width: 39px;
      height: 32px;
      background: rgba(35, 54, 78, 0.32);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .mic-body {
      width: 9px;
      height: 13px;
      border-radius: 5px;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
    }

    .mic-stand {
      width: 13px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 1px;
    }

    /* ── Detail view ────────────────────────────────────────────────────────── */
    #detail-view {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-view.open {
      transform: translateY(0);
    }

    .detail-handle-area {
      display: flex;
      justify-content: center;
      padding: 16px;
      flex-shrink: 0;
    }

    .detail-handle-bar {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: #e0e0e0;
    }

    #detail-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 32px calc(32px + env(safe-area-inset-bottom, 0px));
      padding-top: calc(env(safe-area-inset-top, 44px) + 8px);
    }

    .detail-title {
      font-size: 28px;
      font-weight: 600;
      color: #0a0a0a;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .detail-date {
      font-size: 14px;
      font-weight: 300;
      color: #888;
      margin-bottom: 8px;
    }

    .detail-location {
      font-size: 13px;
      font-weight: 300;
      color: #aaa;
      margin-bottom: 24px;
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section-label {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .detail-avatars {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .detail-avatar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .detail-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: #444;
    }

    .detail-avatar.organiser {
      background: #eef3fe;
      border: 1.5px solid #5b8cf7;
    }

    .detail-avatar-status {
      font-size: 10px;
      font-weight: 300;
      color: #aaa;
    }

    .detail-avatar-org-label {
      font-size: 9px;
      font-weight: 500;
      color: #5b8cf7;
    }

    .detail-notes {
      font-size: 15px;
      font-weight: 300;
      color: #333;
      line-height: 1.6;
    }

    .detail-reminder {
      font-size: 13px;
      font-weight: 300;
      color: #888;
    }

    /* ── Inspect panel ──────────────────────────────────────────────────────── */
    #inspect-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 290;
    }

    #inspect-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 320px;
      background: rgba(15, 15, 15, 0.96);
      border-radius: 24px 24px 0 0;
      z-index: 300;
      transform: translateY(320px);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 32px calc(24px + env(safe-area-inset-bottom, 0px));
    }

    #inspect-panel.open {
      transform: translateY(0);
    }

    .inspect-score {
      font-size: 48px;
      font-weight: 600;
      color: white;
      line-height: 1;
      margin-bottom: 4px;
    }

    .inspect-score-label {
      font-size: 11px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .inspect-breakdown {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .inspect-row {
      display: flex;
      justify-content: space-between;
    }

    .inspect-key {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
    }

    .inspect-val {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
    }

    .inspect-description {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      line-height: 1.5;
      margin-bottom: auto;
      padding: 0 8px;
    }

    .inspect-gotit {
      background: white;
      color: #0a0a0a;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 32px;
      border-radius: 24px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Green flash overlay -->
    <div id="flash-overlay"></div>

    <!-- Top section: mark + pills + greeting -->
    <div id="top-section">
      <svg id="cadence-mark" width="16" height="22" viewBox="0 0 16 22">
        <path d="M8 0v22M0 11h16" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" />
      </svg>

      <div id="pills-row">
        <div class="pill" id="weather-pill">○</div>
        <div class="pill" id="date-pill"></div>
        <div class="pill" id="countdown-pill">—</div>
      </div>

      <div id="greeting-block">
        <h1 id="greeting"></h1>
        <p id="subtitle"></p>
      </div>
    </div>

    <!-- Card area -->
    <div id="card-area">
      <!-- Card stack -->
      <div id="card-stack" style="display:none">
        <div id="peek-card" class="signal-card"></div>
        <div id="main-card" class="signal-card"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" style="display:none">
        <p id="empty-text"></p>
      </div>

      <!-- Gesture hints -->
      <div id="gesture-hints">
        ← Dismiss &nbsp;&nbsp; ↑ Later &nbsp;&nbsp; Accept →
      </div>
    </div>

    <!-- Input bar -->
    <div id="input-bar">
      <div id="input-wrapper">
        <div class="pin-icon">
          <div class="pin-circle"></div>
          <div class="pin-tail"></div>
        </div>
        <input id="ask-input" type="text" placeholder="Ask..." autocomplete="off" />
      </div>
      <button id="mic-btn" aria-label="Submit">
        <div class="mic-body"></div>
        <div class="mic-stand"></div>
      </button>
    </div>
  </div>

  <!-- Detail view (slides up from bottom) -->
  <div id="detail-view">
    <div class="detail-handle-area" id="detail-handle">
      <div class="detail-handle-bar"></div>
    </div>
    <div id="detail-scroll"></div>
  </div>

  <!-- Inspect backdrop + panel -->
  <div id="inspect-backdrop" onclick="closeInspectPanel()"></div>
  <div id="inspect-panel"></div>

  <script>
    'use strict';

    // ── Config ─────────────────────────────────────────────────────────────────
    // Replace YOUR_LOCAL_IP with your machine's IP from ipconfig (e.g. 192.168.1.42)
    const API_BASE = 'http://localhost:3001';

    const MAX_SIGNALS   = 4;
    const SCORE_THRESHOLD = 65;

    // ── Colour maps ────────────────────────────────────────────────────────────
    const COG_COLORS = {
      authorizational: '#5B8CF7',
      action_bound:    '#F7C05B',
      conflict:        '#F75B5B',
      informational:   '#B8BEC6',
      deadline:        '#B8BEC6',
    };

    const COG_LABELS = {
      authorizational: 'Auth',
      action_bound:    'Action',
      conflict:        'Conflict',
      informational:   'Info',
      deadline:        'Deadline',
    };

    const COG_DESC = {
      authorizational: 'The system has resolved this. It needs your approval.',
      action_bound:    'This requires you to act externally. Acknowledge or defer.',
      conflict:        'Two signals overlap. A decision is needed.',
      informational:   'Awareness only. No action required.',
      deadline:        'A time-bound task is approaching.',
    };

    const SOURCE_LABELS = {
      google_calendar: 'Google Cal',
      gmail:           'Gmail',
      manual:          'Manual',
      webhook:         'Webhook',
      apple_calendar:  'Apple Cal',
    };

    const ATTENDEE_STATUS = {
      accepted:    '✓',
      tentative:   '?',
      needsAction: '—',
      declined:    '✗',
    };

    // ── Gradients ──────────────────────────────────────────────────────────────
    const GRADIENTS = {
      morning:   'linear-gradient(to bottom, rgb(0,3,14) 0%, rgb(8,49,136) 18%, rgb(45,120,230) 40%, rgb(148,205,255) 57%, rgb(249,253,255) 100%)',
      afternoon: 'linear-gradient(to bottom, rgb(14,8,0) 0%, rgb(136,80,8) 18%, rgb(230,160,45) 40%, rgb(255,220,148) 57%, rgb(255,253,249) 100%)',
      evening:   'linear-gradient(to bottom, rgb(3,0,14) 0%, rgb(49,8,100) 18%, rgb(100,45,180) 40%, rgb(180,148,255) 57%, rgb(253,249,255) 100%)',
      night:     'linear-gradient(to bottom, rgb(0,0,8) 0%, rgb(5,5,30) 40%, rgb(10,10,40) 100%)',
    };

    function getPeriod(h) {
      if (h >= 5  && h < 12) return 'morning';
      if (h >= 12 && h < 18) return 'afternoon';
      if (h >= 18 && h < 22) return 'evening';
      return 'night';
    }

    // ── State ──────────────────────────────────────────────────────────────────
    const state = {
      queue:       [],   // max 4 CadenceEvent objects
      allEvents:   [],   // all events for countdown
      hintCount:   0,    // gesture hint suppression
      isSwiping:   false,
    };

    // ── Utils ──────────────────────────────────────────────────────────────────
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmt12(date) {
      const h = date.getHours();
      const m = date.getMinutes();
      return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function formatRange(ev) {
      const s = new Date(ev.timestamp);
      if (!ev.deadline) return fmt12(s);
      return `${fmt12(s)} – ${fmt12(new Date(ev.deadline))}`;
    }

    function formatFullDate(ev) {
      const s = new Date(ev.timestamp);
      const d = s.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
      if (!ev.deadline) return `${d} at ${fmt12(s)}`;
      return `${d}  ${fmt12(s)} – ${fmt12(new Date(ev.deadline))}`;
    }

    function getInitials(a) {
      if (a.name) {
        const p = a.name.trim().split(/\s+/);
        return p.length >= 2
          ? (p[0][0] + p[p.length-1][0]).toUpperCase()
          : p[0].slice(0,2).toUpperCase();
      }
      return (a.email || '??').slice(0,2).toUpperCase();
    }

    // ── Gradient ───────────────────────────────────────────────────────────────
    function applyGradient() {
      const period = getPeriod(new Date().getHours());
      document.getElementById('app').style.background = GRADIENTS[period];
    }

    // ── Greeting ───────────────────────────────────────────────────────────────
    function updateGreeting() {
      const h = new Date().getHours();
      let greet;
      if      (h >= 5  && h < 12) greet = 'Good Morning';
      else if (h >= 12 && h < 18) greet = 'Good Afternoon';
      else if (h >= 18 && h < 22) greet = 'Good Evening';
      else                        greet = 'Still up?';

      document.getElementById('greeting').textContent = greet;

      const n = state.queue.length;
      let sub;
      if      (n === 0) sub = 'Nothing urgent right now.';
      else if (n === 1) sub = 'One thing needs your attention.';
      else if (n <= 3)  sub = `${n} things on your radar today.`;
      else              sub = 'Your focus window is full.';
      document.getElementById('subtitle').textContent = sub;
    }

    // ── Date pill ──────────────────────────────────────────────────────────────
    function updateDatePill() {
      const now   = new Date();
      const month = now.toLocaleString('en-US', { month:'short' });
      const day   = String(now.getDate()).padStart(2,'0');
      document.getElementById('date-pill').innerHTML =
        `${esc(month)}. <span class="day-highlight">${esc(day)}</span>`;
    }

    // ── Countdown pill ─────────────────────────────────────────────────────────
    function updateCountdown() {
      const now = new Date();

      const active = state.allEvents.find(e => {
        const s   = new Date(e.timestamp);
        const end = e.deadline ? new Date(e.deadline) : new Date(s.getTime() + 3_600_000);
        return s <= now && now <= end;
      });
      if (active) {
        document.getElementById('countdown-pill').textContent = 'now';
        return;
      }

      const upcoming = [...state.allEvents]
        .filter(e => new Date(e.timestamp) > now)
        .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

      if (!upcoming.length) {
        document.getElementById('countdown-pill').textContent = '—';
        return;
      }

      const ms   = new Date(upcoming[0].timestamp) - now;
      const mins = Math.floor(ms / 60_000);
      const h    = Math.floor(mins / 60);
      const m    = mins % 60;
      document.getElementById('countdown-pill').textContent =
        h > 0 ? `in ${h}h` : `in ${m}m`;
    }

    // ── Empty state countdown ──────────────────────────────────────────────────
    function updateEmptyText() {
      const now = new Date();
      const upcoming = [...state.allEvents]
        .filter(e => new Date(e.timestamp) > now)
        .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

      if (!upcoming.length) {
        document.getElementById('empty-text').textContent = 'Nothing scheduled today';
        return;
      }
      const ev   = upcoming[0];
      const ms   = new Date(ev.timestamp) - now;
      const mins = Math.floor(ms / 60_000);
      const h    = Math.floor(mins / 60);
      const m    = mins % 60;
      const t    = h > 0 && m > 0 ? `in ${h}h ${m}m` : h > 0 ? `in ${h}h` : `in ${m}m`;
      document.getElementById('empty-text').textContent =
        `Next: ${ev.title} ${t}`;
    }

    // ── Weather ────────────────────────────────────────────────────────────────
    function fetchWeather() {
      const WMO = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌦',
                   61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',
                   80:'🌦',81:'🌦',82:'🌦',95:'⛈',96:'⛈',99:'⛈'};

      navigator.geolocation.getCurrentPosition(
        async pos => {
          try {
            const { latitude: lat, longitude: lon } = pos.coords;
            const r    = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await r.json();
            const temp = Math.round(data.current_weather.temperature);
            const icon = WMO[data.current_weather.weathercode] ?? '🌡';
            document.getElementById('weather-pill').textContent = `${icon} ${temp}°`;
          } catch { /* keep '○' */ }
        },
        () => { /* location denied — keep '○' */ }
      );
    }

    // ── Fetch signals ──────────────────────────────────────────────────────────
    async function fetchSignals() {
      try {
        fetch(`${API_BASE}/sync/google`).catch(() => {});

        let events = [];
        try {
          const r    = await fetch(`${API_BASE}/digest`);
          const data = await r.json();
          events = data.events ?? [];
        } catch { /* fall through */ }

        if (!events.length) {
          const r    = await fetch(`${API_BASE}/events/surfaced`);
          const data = await r.json();
          events = data.events ?? [];
        }

        state.allEvents = events;
        state.queue = events
          .filter(e => e.score >= SCORE_THRESHOLD)
          .sort((a,b) => b.score - a.score)
          .slice(0, MAX_SIGNALS);
      } catch (err) {
        console.error('[Cadence] fetchSignals:', err);
      }

      renderAll();
    }

    // ── Render card HTML ───────────────────────────────────────────────────────
    function cardInnerHTML(ev) {
      const cogColor = COG_COLORS[ev.cognitive_type]  ?? '#B8BEC6';
      const cogLabel = COG_LABELS[ev.cognitive_type]  ?? 'Info';
      const srcLabel = SOURCE_LABELS[ev.source]       ?? esc(ev.source);
      const score    = Math.min(100, Math.max(0, ev.score ?? 0));

      return `
        <div class="card-header">
          <div class="cog-badge">
            <span class="cog-dot" style="background:${cogColor}"></span>
            <span class="cog-label">${esc(cogLabel)}</span>
          </div>
          <div class="source-badge">${esc(srcLabel)}</div>
        </div>
        <div class="card-title">${esc(ev.title)}</div>
        <div class="card-time">${esc(formatRange(ev))}</div>
        ${ev.location ? `<div class="card-location">📍 ${esc(ev.location)}</div>` : ''}
        <div class="score-track">
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${score}%;background:${cogColor}66"></div>
          </div>
        </div>
      `;
    }

    // ── Render all UI ──────────────────────────────────────────────────────────
    function renderAll() {
      applyGradient();
      updateGreeting();
      updateDatePill();
      updateCountdown();

      const stack   = document.getElementById('card-stack');
      const empty   = document.getElementById('empty-state');
      const hints   = document.getElementById('gesture-hints');
      const mainEl  = document.getElementById('main-card');
      const peekEl  = document.getElementById('peek-card');

      if (!state.queue.length) {
        stack.style.display = 'none';
        empty.style.display = 'flex';
        hints.style.display = 'none';
        updateEmptyText();
        return;
      }

      stack.style.display = 'block';
      empty.style.display = 'none';
      hints.style.display = state.hintCount < 3 ? 'block' : 'none';

      // Main card
      mainEl.innerHTML = cardInnerHTML(state.queue[0]);
      mainEl.style.transform = '';
      mainEl.style.opacity   = '';
      mainEl.style.transition = '';

      // Peek card
      if (state.queue[1]) {
        peekEl.innerHTML = cardInnerHTML(state.queue[1]);
        peekEl.style.display = 'block';
      } else {
        peekEl.style.display = 'none';
      }

      attachGestures(mainEl);
    }

    // ── Flash green ────────────────────────────────────────────────────────────
    function flashGreen() {
      const el = document.getElementById('flash-overlay');
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 400);
    }

    // ── Post feedback ──────────────────────────────────────────────────────────
    async function postFeedback(id, outcome) {
      try {
        await fetch(`${API_BASE}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cadence_event_id: id, outcome }),
        });
      } catch { /* silent */ }
    }

    // ── Swipe actions ──────────────────────────────────────────────────────────
    function doSwipeRight() {
      if (state.isSwiping || !state.queue.length) return;
      state.isSwiping = true;
      state.hintCount++;

      const card = state.queue[0];
      const el   = document.getElementById('main-card');
      el.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
      el.style.transform  = 'translateX(130vw) rotate(15deg)';
      el.style.opacity    = '0';
      flashGreen();
      postFeedback(card.id, 'actioned');

      // Promote peek card
      promotePeek();

      setTimeout(() => {
        state.queue.shift();
        state.isSwiping = false;
        renderAll();
      }, 340);
    }

    function doSwipeLeft() {
      if (state.isSwiping || !state.queue.length) return;
      state.isSwiping = true;
      state.hintCount++;

      const card = state.queue[0];
      const el   = document.getElementById('main-card');
      el.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
      el.style.transform  = 'translateX(-130vw) rotate(-15deg)';
      el.style.opacity    = '0';
      postFeedback(card.id, 'dismissed');
      promotePeek();

      setTimeout(() => {
        state.queue.shift();
        state.isSwiping = false;
        renderAll();
      }, 340);
    }

    function doSwipeUp() {
      if (state.isSwiping || !state.queue.length) return;
      state.isSwiping = true;
      state.hintCount++;

      const card = state.queue[0];
      const el   = document.getElementById('main-card');
      el.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s';
      el.style.transform  = 'translateY(-110vh)';
      el.style.opacity    = '0';
      postFeedback(card.id, 'ignored');
      promotePeek();

      setTimeout(() => {
        state.queue.shift();
        state.queue.push(card); // back of queue
        state.isSwiping = false;
        renderAll();
      }, 340);
    }

    function snapBack(el) {
      el.style.transition = 'transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
      el.style.transform  = 'translateX(0) translateY(0) rotate(0deg)';
    }

    // Animate peek card scaling up (spring feel)
    function promotePeek() {
      const peek = document.getElementById('peek-card');
      if (!state.queue[1]) return;
      peek.style.transition = 'transform 0.4s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s';
      peek.style.transform  = 'scale(1) translateY(0)';
      peek.style.opacity    = '1';
    }

    // ── Touch gesture handler ──────────────────────────────────────────────────
    function attachGestures(el) {
      let startX, startY, startTime;
      let longPressTimer = null;
      let longPressFired = false;
      let dragging = false;

      el.addEventListener('touchstart', e => {
        if (state.isSwiping) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        startTime = Date.now();
        longPressFired = false;
        dragging = false;

        longPressTimer = setTimeout(() => {
          longPressFired = true;
          if (state.queue[0]) openInspectPanel(state.queue[0]);
        }, 500);
      }, { passive: true });

      el.addEventListener('touchmove', e => {
        clearTimeout(longPressTimer);
        if (state.isSwiping) return;
        dragging = true;
        e.preventDefault();

        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;

        el.style.transition = 'none';
        el.style.transform =
          `translateX(${dx}px) translateY(${dy * 0.4}px) rotate(${dx * 0.04}deg)`;
      }, { passive: false });

      el.addEventListener('touchend', e => {
        clearTimeout(longPressTimer);
        if (state.isSwiping || longPressFired) return;

        const dx    = e.changedTouches[0].clientX - startX;
        const dy    = e.changedTouches[0].clientY - startY;
        const dist  = Math.sqrt(dx * dx + dy * dy);
        const dt    = Date.now() - startTime;

        if (dist < 10 && dt < 300 && !dragging) {
          // Tap → detail view
          el.style.transition = '';
          el.style.transform  = '';
          if (state.queue[0]) openDetailView(state.queue[0]);
        } else if (dx > 80) {
          doSwipeRight();
        } else if (dx < -80) {
          doSwipeLeft();
        } else if (dy < -80) {
          doSwipeUp();
        } else {
          snapBack(el);
        }
      }, { passive: true });

      el.addEventListener('touchcancel', () => {
        clearTimeout(longPressTimer);
        snapBack(el);
      }, { passive: true });
    }

    // ── Detail view ────────────────────────────────────────────────────────────
    function openDetailView(ev) {
      const attendeesHtml = (ev.attendees && ev.attendees.length)
        ? `<div class="detail-section">
            <div class="detail-section-label">People</div>
            <div class="detail-avatars">
              ${ev.attendees.map(a => `
                <div class="detail-avatar-item">
                  <div class="detail-avatar${a.organiser ? ' organiser' : ''}">${esc(getInitials(a))}</div>
                  <div class="detail-avatar-status">${ATTENDEE_STATUS[a.status] ?? '—'}</div>
                  ${a.organiser ? '<div class="detail-avatar-org-label">org</div>' : ''}
                </div>
              `).join('')}
            </div>
          </div>`
        : '';

      const notesHtml = ev.raw_content
        ? `<div class="detail-section">
            <div class="detail-section-label">Notes</div>
            <div class="detail-notes">${esc(ev.raw_content)}</div>
          </div>`
        : '';

      const reminderHtml = ev.reminder_minutes != null
        ? `<div class="detail-reminder">🔔 ${ev.reminder_minutes} minutes before</div>`
        : '';

      document.getElementById('detail-scroll').innerHTML = `
        <div class="detail-title">${esc(ev.title)}</div>
        <div class="detail-date">${esc(formatFullDate(ev))}</div>
        ${ev.location ? `<div class="detail-location">📍 ${esc(ev.location)}</div>` : ''}
        ${attendeesHtml}
        ${notesHtml}
        ${reminderHtml}
      `;

      document.getElementById('detail-view').classList.add('open');

      // Swipe down on handle to close
      const handle  = document.getElementById('detail-handle');
      let dtStartY;

      function onDTStart(e) { dtStartY = (e.touches || e.changedTouches)[0].clientY; }
      function onDTEnd(e) {
        const dy = (e.changedTouches)[0].clientY - dtStartY;
        if (dy > 80) closeDetailView();
      }

      handle.addEventListener('touchstart', onDTStart, { passive: true });
      handle.addEventListener('touchend',   onDTEnd,   { passive: true });
    }

    function closeDetailView() {
      document.getElementById('detail-view').classList.remove('open');
    }

    // ── Inspect panel ──────────────────────────────────────────────────────────
    function openInspectPanel(ev) {
      const cogColor = COG_COLORS[ev.cognitive_type] ?? '#B8BEC6';
      const srcLabel = SOURCE_LABELS[ev.source] ?? esc(ev.source);
      const desc     = COG_DESC[ev.cognitive_type] ?? '';

      document.getElementById('inspect-panel').innerHTML = `
        <div class="inspect-score">${Math.round(ev.score ?? 0)}</div>
        <div class="inspect-score-label">Priority Score</div>
        <div class="inspect-breakdown">
          <div class="inspect-row">
            <span class="inspect-key">Cognitive type</span>
            <span class="inspect-val" style="color:${cogColor}">${esc((ev.cognitive_type ?? '').replace('_',' '))}</span>
          </div>
          <div class="inspect-row">
            <span class="inspect-key">Source</span>
            <span class="inspect-val">${esc(srcLabel)}</span>
          </div>
          ${ev.deadline ? `
          <div class="inspect-row">
            <span class="inspect-key">Has deadline</span>
            <span class="inspect-val">×1.8</span>
          </div>` : ''}
        </div>
        <div class="inspect-description">${esc(desc)}</div>
        <button class="inspect-gotit" onclick="closeInspectPanel()">Got it</button>
      `;

      document.getElementById('inspect-panel').classList.add('open');
      document.getElementById('inspect-backdrop').style.display = 'block';
    }

    function closeInspectPanel() {
      document.getElementById('inspect-panel').classList.remove('open');
      document.getElementById('inspect-backdrop').style.display = 'none';
    }

    // ── Input bar ──────────────────────────────────────────────────────────────
    async function submitInput() {
      const input   = document.getElementById('ask-input');
      const trimmed = input.value.trim();
      if (!trimmed) return;
      input.value = '';
      input.blur();

      try {
        await fetch(`${API_BASE}/events`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: trimmed, source: 'manual' }),
        });
        await fetchSignals();
      } catch {
        /* silent — don't block UX */
      }
    }

    document.getElementById('mic-btn').addEventListener('click', submitInput);
    document.getElementById('ask-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitInput();
    });

    // ── Periodic updates ───────────────────────────────────────────────────────
    setInterval(() => {
      applyGradient();
      updateGreeting();
      updateCountdown();
      updateEmptyText();
    }, 60_000);

    setInterval(fetchSignals, 5 * 60_000);

    // ── Init ───────────────────────────────────────────────────────────────────
    (async function init() {
      applyGradient();
      updateGreeting();
      updateDatePill();
      updateCountdown();
      fetchWeather();
      await fetchSignals();
    })();
  </script>
</body>
</html>
