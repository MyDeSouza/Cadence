<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Cadence — Canvas</title>

  <!-- Outfit typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Design tokens first -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/canvas.css" />
  <link rel="stylesheet" href="styles/panels.css" />
  <link rel="stylesheet" href="styles/presence.css" />

  <style>
    /* Inline overrides / fine-tuning */
    .panel-body { overflow-y: auto; }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .panel-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Stagger presence cursor opacity on load */
    .presence-cursor { opacity: 0; transition: opacity 0.6s ease; }
    .presence-cursor.visible { opacity: 1; }

    /* Figma panel body flex fix */
    .panel[data-tool="figma"] .panel-body {
      display: flex;
      flex-direction: column;
    }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--c0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-mark {
      width: 40px;
      height: 40px;
      background: var(--c2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      animation: loading-pulse 1.2s ease-in-out infinite;
    }

    @keyframes loading-pulse {
      0%, 100% { transform: scale(1);    opacity: 1;   }
      50%       { transform: scale(0.9); opacity: 0.7; }
    }

    .loading-text {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      font-family: 'Outfit', sans-serif;
      letter-spacing: 0.3px;
    }
  </style>
</head>

<body>

  <!-- ── Loading screen ──────────────────────────────────── -->
  <div id="loading-screen">
    <div class="loading-mark">C</div>
    <span class="loading-text">Loading canvas…</span>
  </div>

  <!-- ── Topbar ───────────────────────────────────────────── -->
  <nav class="topbar">

    <!-- Logo -->
    <div class="topbar-logo">
      <div class="topbar-logo-mark">C</div>
      <span class="topbar-logo-name">Cadence</span>
    </div>

    <div class="topbar-divider"></div>

    <!-- Context indicator (updated by triage.js) -->
    <div class="topbar-context">
      <div class="topbar-context-pill">
        <span class="dot"></span>
        <span>Loading context…</span>
      </div>
    </div>

    <!-- Right side controls -->
    <div class="topbar-right">

      <!-- Live clock -->
      <span class="topbar-clock">––:––</span>

      <div class="topbar-divider"></div>

      <!-- Presence avatars (populated by presence.js) -->
      <div class="topbar-presence"></div>

      <div class="topbar-divider"></div>

      <!-- Fit all panels -->
      <button class="topbar-btn" id="btn-fit" title="Fit all panels (F)">⊞</button>

      <!-- Pan mode hint -->
      <button class="topbar-btn" id="btn-help" title="Space + drag to pan · Scroll to zoom">?</button>

    </div>
  </nav>

  <!-- ── Canvas viewport ─────────────────────────────────── -->
  <div id="canvas-viewport">

    <!-- Infinite canvas world -->
    <div id="canvas-world">

      <!-- Context connection lines (drawn by panels.js) -->
      <svg id="context-lines-svg"
           xmlns="http://www.w3.org/2000/svg"
           style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;">
      </svg>

      <!-- Panels injected here by panels.js -->

    </div>
  </div>

  <!-- ── Presence cursor overlay (fixed, screen-space) ───── -->
  <div id="presence-overlay"></div>

  <!-- ── Minimap ─────────────────────────────────────────── -->
  <div id="minimap">
    <div class="minimap-viewport"></div>
  </div>

  <!-- ── Zoom controls ───────────────────────────────────── -->
  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-out" title="Zoom out (−)">−</button>
    <span class="zoom-level">100%</span>
    <button class="zoom-btn" id="zoom-in"  title="Zoom in (+)">+</button>
    <button class="zoom-btn" id="zoom-reset" title="Reset zoom (0)" style="font-size:11px;color:var(--w32)">fit</button>
  </div>

  <!-- ── Keyboard hints ──────────────────────────────────── -->
  <div id="kbd-hint">
    <div class="kbd-hint-item"><kbd>Space</kbd> + drag to pan</div>
    <div class="kbd-hint-item"><kbd>scroll</kbd> to zoom</div>
    <div class="kbd-hint-item"><kbd>F</kbd> fit all</div>
    <div class="kbd-hint-item"><kbd>0</kbd> reset</div>
  </div>

  <!-- ── Scripts (order matters: data → triage → canvas → panels → presence) ── -->
  <script src="data/mock.js"></script>
  <script src="js/api/calendar.js"></script>
  <script src="js/api/notion.js"></script>
  <script src="js/api/slack.js"></script>
  <script src="js/api/tasks.js"></script>
  <script src="js/api/figma.js"></script>
  <script src="js/triage.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/presence.js"></script>

  <script>
    // ── Boot sequence ──────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {

      // 1. Compute weights (needed by Panels before init)
      Triage.init();

      // 2. Spatial engine
      Canvas.init();

      // 3. Panels (uses Triage weights + Canvas coords)
      Panels.init();

      // 4. Presence simulation
      Presence.init();
      Presence.startClock();

      // 5. Fit-all button
      document.getElementById('btn-fit')?.addEventListener('click', () => Canvas.fitAll());

      // 6. Fade loading screen after first paint
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const screen = document.getElementById('loading-screen');
          screen.classList.add('fade-out');
          setTimeout(() => screen.remove(), 600);

          // Delay cursor visibility for polish
          setTimeout(() => {
            document.querySelectorAll('.presence-cursor').forEach((c, i) => {
              setTimeout(() => c.classList.add('visible'), i * 300);
            });
          }, 800);
        });
      });
    });
  </script>

</body>
</html>
