<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wireframe - 28</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: 'Outfit', sans-serif; }
    .screen-wrapper {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #111; padding: 24px;
    }
    .screen {
      position: relative; width: 1440px; height: 1024px;
      overflow: hidden; border-radius: 20px; background: #161717; flex-shrink: 0;
    }
    .cloud-blob {
      position: absolute; border-radius: 50%; pointer-events: none;
      background: radial-gradient(circle, rgba(200,215,235,0.48) 0%, rgba(200,215,235,0) 70%);
      filter: blur(30px);
    }
    .dot-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.16) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .vignette {
      position: absolute; inset: 0; pointer-events: none;
      box-shadow: inset 0 0 69px 12px rgba(0,0,0,0.08);
    }
    .cal-row { display: flex; gap: 10px; width: 100%; }
    .cal-cell {
      flex: 1; background: rgba(255,255,255,0.08); border-radius: 16px;
      padding: 8px 12px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 400; color: white; line-height: 1.25;
    }
    .cal-cell.active { background: rgba(255,255,255,0.64); }
  </style>
</head>
<body>
<div class="screen-wrapper">
  <div class="screen" id="screen">

    <!-- Sky gradient -->
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,#28364b,#8f9fb8);pointer-events:none;"></div>
    <!-- Dot grid -->
    <div class="dot-grid"></div>
    <!-- Cloud blobs -->
    <div class="cloud-blob" style="width:430px;height:430px;left:-70px;top:0px;"></div>
    <div class="cloud-blob" style="width:340px;height:250px;left:90px;top:50px;"></div>
    <div class="cloud-blob" style="width:340px;height:220px;left:90px;top:200px;"></div>
    <div class="cloud-blob" style="width:430px;height:430px;left:210px;top:115px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:475px;top:155px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:475px;top:310px;"></div>
    <div class="cloud-blob" style="width:430px;height:430px;left:830px;top:70px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:1090px;top:105px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:1090px;top:265px;"></div>

    <!-- =====================================================
         LARGE CALENDAR NOTCH  (frame 1358:1137 – Wireframe 28)
         left: 0, top: 159px, height: 311px, width: 347px
         32px corner caps, 247px body
    ===================================================== -->
    <div style="position:absolute;left:0;top:159px;width:347px;height:311px;">
      <!-- STACK body -->
      <div style="
        position:absolute;left:0;top:32px;width:347px;height:247px;
        background:linear-gradient(88.32deg,#161717 50%,rgba(22,23,23,0.64) 177%);
        border-radius:0 32px 32px 0;
        padding:8px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        overflow:hidden;
      ">
        <!-- Calendar grid container -->
        <div style="
          background:rgba(255,255,255,0.04);
          border-radius:24px;
          padding:8px;
          display:flex;flex-direction:column;gap:8px;
          width:329px;
        ">
          <!-- Month label -->
          <div style="padding:8px 12px;">
            <span style="font-size:16px;font-weight:300;color:white;line-height:1.25;">Mar.</span>
          </div>
          <!-- Week row 1: 04–10 -->
          <div class="cal-row">
            <div class="cal-cell">04</div>
            <div class="cal-cell">05</div>
            <div class="cal-cell">06</div>
            <div class="cal-cell">07</div>
            <div class="cal-cell active">08</div>
            <div class="cal-cell">09</div>
            <div class="cal-cell">10</div>
          </div>
          <!-- Week row 2: 11–17 -->
          <div class="cal-row">
            <div class="cal-cell">11</div>
            <div class="cal-cell">12</div>
            <div class="cal-cell">13</div>
            <div class="cal-cell">14</div>
            <div class="cal-cell active">15</div>
            <div class="cal-cell">16</div>
            <div class="cal-cell">17</div>
          </div>
          <!-- Week row 3: 18–24 -->
          <div class="cal-row">
            <div class="cal-cell">18</div>
            <div class="cal-cell">19</div>
            <div class="cal-cell">20</div>
            <div class="cal-cell">21</div>
            <div class="cal-cell active">22</div>
            <div class="cal-cell">23</div>
            <div class="cal-cell">24</div>
          </div>
          <!-- Week row 4: 25–31 -->
          <div class="cal-row">
            <div class="cal-cell">25</div>
            <div class="cal-cell">26</div>
            <div class="cal-cell">27</div>
            <div class="cal-cell">28</div>
            <div class="cal-cell active">29</div>
            <div class="cal-cell">30</div>
            <div class="cal-cell">31</div>
          </div>
        </div>
      </div>
      <!-- Top corner cap: sky color, bottom-right rounded -->
      <div style="position:absolute;left:0;top:0;width:32px;height:32px;background:#6b7483;border-radius:0 0 32px 0;"></div>
      <!-- Bottom corner cap: sky color, top-right rounded -->
      <div style="position:absolute;left:0;bottom:0;width:32px;height:32px;background:#727c8a;border-radius:0 32px 0 0;"></div>
    </div>

    <!-- =====================================================
         NAVSTACK – centered header
    ===================================================== -->
    <div style="
      position:absolute;left:50%;top:82px;transform:translateX(-50%);
      display:flex;flex-direction:column;gap:12px;padding:0 8px;
    ">
      <div style="display:flex;align-items:flex-end;gap:46px;padding:0 12px;overflow:hidden;">
        <span style="font-size:24px;font-weight:400;color:white;white-space:nowrap;line-height:1.25;">GradEX Committee Workshop</span>
        <span style="font-size:12px;font-weight:400;color:white;white-space:nowrap;line-height:1.25;text-align:right;">11:50 - 2:50pm</span>
      </div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;padding:0 12px;opacity:0.64;overflow:hidden;">
        <span style="font-size:12px;font-weight:400;color:white;line-height:1.25;flex:1;">Lazer Cut Components for Presentation</span>
        <span style="font-size:10px;font-weight:400;color:white;white-space:nowrap;line-height:1.25;text-align:right;">3hrs</span>
      </div>
    </div>

    <!-- =====================================================
         BOTTOM CHAT BAR – "What are we drafting?..." (top: 927px)
    ===================================================== -->
    <div style="
      position:absolute;left:50%;top:927px;transform:translateX(-50%);
      background:rgba(0,0,0,0.16);backdrop-filter:blur(12px);
      border-radius:20px;padding:8px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 4px 18.1px rgba(0,0,0,0.12);
      min-width:260px;
    ">
      <div style="padding:8px 12px;">
        <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,0.64);line-height:1.25;">What are we drafting?...</span>
      </div>
      <!-- Cadence snowflake icon button -->
      <div style="background:black;border-radius:12px;width:45px;height:45px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)"/>
          <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(60 13 13)"/>
          <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(120 13 13)"/>
          <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(180 13 13)"/>
          <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(240 13 13)"/>
          <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(300 13 13)"/>
        </svg>
      </div>
    </div>

    <!-- Vignette -->
    <div class="vignette"></div>
  </div>
</div>
<script>
  function scaleScreen() {
    const s = document.getElementById('screen');
    const w = s.parentElement;
    const scale = Math.min((w.clientWidth - 48) / 1440, (w.clientHeight - 48) / 1024, 1);
    s.style.transform = `scale(${scale})`;
    s.style.transformOrigin = 'top center';
    w.style.alignItems = (1024 * scale < w.clientHeight - 48) ? 'center' : 'flex-start';
  }
  scaleScreen();
  window.addEventListener('resize', scaleScreen);
</script>
</body>
</html>
