<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>1358:1170 — Chat Bar (Initial)</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1f2a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; gap: 40px; }
    .label { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div style="transform: scale(2); transform-origin: center;">
    <!--
      1358:1170 — Initial chat bar.
      Frosted outer, single row: placeholder + black AI icon button.
    -->
    <div style="background:rgba(0,0,0,0.16);border-radius:20px;padding:8px;box-shadow:0 4px 18.1px rgba(0,0,0,0.12);display:flex;flex-direction:column;align-items:flex-start;justify-content:center;overflow:hidden;">
      <!-- Chat row -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <!-- Placeholder text -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 55px 8px 12px;border-radius:20px;flex-shrink:0;">
          <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,0.64);line-height:1.25;white-space:nowrap;">What are we drafting?...</span>
        </div>
        <!-- Black AI icon button -->
        <div style="position:relative;width:45px;height:45px;overflow:hidden;border-radius:12px;background:black;flex-shrink:0;">
          <!-- Petal 1: E17, no-rotation -->
          <div style="position:absolute;width:19px;height:20px;left:calc(50% - 9px);top:22px;transform:translateX(-50%);">
            <div style="position:absolute;top:-30%;right:-63.16%;bottom:-40%;left:-13.16%;">
              <img src="https://www.figma.com/api/mcp/asset/60033f94-be99-45b5-a509-6f9de545b04a" alt="" style="display:block;max-width:none;width:100%;height:100%;">
            </div>
          </div>
          <!-- Petal 2: E23, rotate-180 -->
          <div style="position:absolute;width:19px;height:21px;left:calc(50% + 13px);top:-1px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
            <div style="transform:rotate(180deg);flex-shrink:0;">
              <div style="position:relative;width:19px;height:21px;">
                <div style="position:absolute;top:-28.57%;right:-63.16%;bottom:-35.71%;left:-13.16%;">
                  <img src="https://www.figma.com/api/mcp/asset/b740e93f-d966-4b0d-9934-0a83169c977d" alt="" style="display:block;max-width:none;width:100%;height:100%;">
                </div>
              </div>
            </div>
          </div>
          <!-- Petal 3: E19, rotate-180, 20×20 -->
          <div style="position:absolute;width:20px;height:20px;left:calc(50% + 9.5px);top:4px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
            <div style="transform:rotate(180deg);flex-shrink:0;">
              <div style="position:relative;width:20px;height:20px;">
                <div style="position:absolute;top:-30%;right:-60%;bottom:-40%;left:-10%;">
                  <img src="https://www.figma.com/api/mcp/asset/b73c7bd7-1fe3-425a-8dd5-873b6da8ff56" alt="" style="display:block;max-width:none;width:100%;height:100%;">
                </div>
              </div>
            </div>
          </div>
          <!-- Petal 4: E21, no-rotation -->
          <div style="position:absolute;width:19px;height:21px;left:calc(50% - 14px);top:26px;transform:translateX(-50%);">
            <div style="position:absolute;top:-28.57%;right:-63.16%;bottom:-35.71%;left:-13.16%;">
              <img src="https://www.figma.com/api/mcp/asset/65634c05-9959-4a8c-abf2-a8e212ee7555" alt="" style="display:block;max-width:none;width:100%;height:100%;">
            </div>
          </div>
          <!-- Petal 5: E24, -rotate90, 20×20 -->
          <div style="position:absolute;width:20px;height:20px;left:calc(50% + 9.5px);top:22px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
            <div style="transform:rotate(-90deg);flex-shrink:0;">
              <div style="position:relative;width:20px;height:20px;">
                <div style="position:absolute;top:-30%;right:-60%;bottom:-40%;left:-10%;">
                  <img src="https://www.figma.com/api/mcp/asset/7a78d955-9e02-4743-91e4-fe28611e4b71" alt="" style="display:block;max-width:none;width:100%;height:100%;">
                </div>
              </div>
            </div>
          </div>
          <!-- Petal 6: E22, rotate90, w:20 h:19 -->
          <div style="position:absolute;width:19px;height:20px;left:calc(50% - 9px);top:4px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
            <div style="transform:rotate(90deg);flex-shrink:0;">
              <div style="position:relative;width:20px;height:19px;">
                <div style="position:absolute;top:-31.58%;right:-60%;bottom:-44.74%;left:-10%;">
                  <img src="https://www.figma.com/api/mcp/asset/febbead3-3f7f-4ee5-9c03-0d1ab559450d" alt="" style="display:block;max-width:none;width:100%;height:100%;">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <span class="label">1358:1170 — Chat Bar (Initial)</span>
</body>
</html>
