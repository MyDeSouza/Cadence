<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>1357:780 — AI App Icon Small</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1f2a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; gap: 40px; }
    .label { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div style="transform: scale(5); transform-origin: center;">
    <!--
      1357:780 — 45×45 white, 6 petals at 13px each.
      Positions offset slightly from center (±5px, ±8.5px, ±6px).
    -->
    <div style="background:white;border-radius:12px;width:45px;height:45px;overflow:hidden;position:relative;">

      <!-- Petal 1: E17, no-rotation, left:50%-5px, top:22 -->
      <div style="position:absolute;width:13px;height:13px;left:calc(50% - 5px);top:22px;transform:translateX(-50%);">
        <div style="position:absolute;top:0;left:50%;right:0;bottom:50%;">
          <img src="https://www.figma.com/api/mcp/asset/377a381d-bdb8-42fd-9e0c-477aae792f6b" alt="" style="display:block;max-width:none;width:100%;height:100%;">
        </div>
      </div>

      <!-- Petal 2: E23, rotate-180, left:50%+8.5px, top:8, w:12 h:13 -->
      <div style="position:absolute;width:12px;height:13px;left:calc(50% + 8.5px);top:8px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
        <div style="transform:rotate(180deg);flex-shrink:0;">
          <div style="position:relative;width:12px;height:13px;">
            <div style="position:absolute;top:0;left:50%;right:0;bottom:50%;">
              <img src="https://www.figma.com/api/mcp/asset/3530afa3-f7e0-40b2-ac75-c592967b2367" alt="" style="display:block;max-width:none;width:100%;height:100%;">
            </div>
          </div>
        </div>
      </div>

      <!-- Petal 3: E19, rotate-180, left:50%+6px, top:11, 13×13 -->
      <div style="position:absolute;width:13px;height:13px;left:calc(50% + 6px);top:11px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
        <div style="transform:rotate(180deg);flex-shrink:0;">
          <div style="position:relative;width:13px;height:13px;">
            <div style="position:absolute;top:0;left:50%;right:0;bottom:50%;">
              <img src="https://www.figma.com/api/mcp/asset/0cfd7635-6351-473d-be6b-594c57738927" alt="" style="display:block;max-width:none;width:100%;height:100%;">
            </div>
          </div>
        </div>
      </div>

      <!-- Petal 4: E21, no-rotation, left:50%-8.5px, top:25, w:12 h:13 -->
      <div style="position:absolute;width:12px;height:13px;left:calc(50% - 8.5px);top:25px;transform:translateX(-50%);">
        <div style="position:absolute;top:0;left:50%;right:0;bottom:50%;">
          <img src="https://www.figma.com/api/mcp/asset/fef93ee8-7fe2-489f-aaec-8cf8f3fce108" alt="" style="display:block;max-width:none;width:100%;height:100%;">
        </div>
      </div>

      <!-- Petal 5: E24, -rotate90, left:50%+6px, top:22, 13×13 -->
      <div style="position:absolute;width:13px;height:13px;left:calc(50% + 6px);top:22px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
        <div style="transform:rotate(-90deg);flex-shrink:0;">
          <div style="position:relative;width:13px;height:13px;">
            <div style="position:absolute;top:0;left:50%;right:0;bottom:50%;">
              <img src="https://www.figma.com/api/mcp/asset/bdc5fa7b-9ca2-4b56-b739-f50ad373f804" alt="" style="display:block;max-width:none;width:100%;height:100%;">
            </div>
          </div>
        </div>
      </div>

      <!-- Petal 6: E22, rotate90, left:50%-5px, top:11, 13×13 -->
      <div style="position:absolute;width:13px;height:13px;left:calc(50% - 5px);top:11px;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;">
        <div style="transform:rotate(90deg);flex-shrink:0;">
          <div style="position:relative;width:13px;height:13px;">
            <div style="position:absolute;top:0;left:50%;right:0;bottom:50%;">
              <img src="https://www.figma.com/api/mcp/asset/fe5ed0e2-8855-41fa-972e-f6134e172538" alt="" style="display:block;max-width:none;width:100%;height:100%;">
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <span class="label">1357:780 — AI App Icon Small</span>
</body>
</html>
