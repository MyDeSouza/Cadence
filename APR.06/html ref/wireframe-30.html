<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wireframe - 30</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: 'Outfit', sans-serif; }
    .screen-wrapper {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #111; padding: 24px;
    }
    .screen {
      position: relative; width: 1440px; height: 1024px;
      overflow: hidden; border-radius: 20px; background: #161717; flex-shrink: 0;
    }
    .cloud-blob {
      position: absolute; border-radius: 50%; pointer-events: none;
      background: radial-gradient(circle, rgba(200,215,235,0.48) 0%, rgba(200,215,235,0) 70%);
      filter: blur(30px);
    }
    .dot-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.16) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .vignette {
      position: absolute; inset: 0; pointer-events: none;
      box-shadow: inset 0 0 69px 12px rgba(0,0,0,0.08);
    }
    .doc-icon-btn {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      width: 45px; height: 45px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
  </style>
</head>
<body>
<div class="screen-wrapper">
  <div class="screen" id="screen">

    <!-- Sky gradient -->
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,#28364b,#8f9fb8);pointer-events:none;"></div>
    <!-- Dot grid -->
    <div class="dot-grid"></div>
    <!-- Cloud blobs -->
    <div class="cloud-blob" style="width:430px;height:430px;left:-70px;top:0px;"></div>
    <div class="cloud-blob" style="width:340px;height:250px;left:90px;top:50px;"></div>
    <div class="cloud-blob" style="width:340px;height:220px;left:90px;top:200px;"></div>
    <div class="cloud-blob" style="width:430px;height:430px;left:210px;top:115px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:475px;top:155px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:475px;top:310px;"></div>
    <div class="cloud-blob" style="width:430px;height:430px;left:830px;top:70px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:1090px;top:105px;"></div>
    <div class="cloud-blob" style="width:295px;height:240px;left:1090px;top:265px;"></div>

    <!-- =====================================================
         SMALL NOTCH – 3 icons
    ===================================================== -->
    <div style="position:absolute;left:0;top:70px;width:62px;height:284px;">
      <div style="
        position:absolute;left:0;top:16px;width:62px;height:252px;
        background:linear-gradient(89.7deg,#161717 50%,rgba(22,23,23,0.64) 177%);
        border-radius:0 20px 20px 0;
        padding:8px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;
      ">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <span style="font-size:16px;font-weight:500;color:white;line-height:1.25;">Mar.</span>
          <div style="background:rgba(255,255,255,0.08);border-radius:12px;width:45px;height:45px;display:flex;align-items:center;justify-content:center;">
            <span style="font-size:24px;font-weight:500;color:white;line-height:0.76;">08</span>
          </div>
        </div>
        <div style="width:45px;height:45px;display:flex;align-items:center;justify-content:center;">
          <svg width="45" height="45" viewBox="0 0 45 45" fill="none">
            <rect x="7" y="10" width="13" height="12" rx="5" stroke="white" stroke-width="2.5"/>
            <rect x="23" y="7" width="15" height="15" rx="5" stroke="white" stroke-width="2.5"/>
            <rect x="9" y="24" width="26" height="14" rx="5" stroke="white" stroke-width="2.5"/>
          </svg>
        </div>
        <div style="width:45px;height:45px;display:flex;align-items:center;justify-content:center;">
          <img src="https://www.figma.com/api/mcp/asset/c21b3043-e6e5-4509-a475-b2e8ea6e12fc" alt="Cadence" style="width:21px;height:28px;object-fit:contain;"/>
        </div>
      </div>
      <div style="position:absolute;left:0;top:0;width:16px;height:16px;background:#6e7887;border-radius:0 0 20px 0;"></div>
      <div style="position:absolute;left:0;bottom:0;width:16px;height:16px;background:#606d80;border-radius:0 20px 0 0;"></div>
    </div>

    <!-- =====================================================
         NAVSTACK
    ===================================================== -->
    <div style="
      position:absolute;left:50%;top:82px;transform:translateX(-50%);
      display:flex;flex-direction:column;gap:12px;padding:0 8px;
    ">
      <div style="display:flex;align-items:flex-end;gap:46px;padding:0 12px;overflow:hidden;">
        <span style="font-size:24px;font-weight:400;color:white;white-space:nowrap;line-height:1.25;">GradEX Committee Workshop</span>
        <span style="font-size:12px;font-weight:400;color:white;white-space:nowrap;line-height:1.25;text-align:right;">11:50 - 2:50pm</span>
      </div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;padding:0 12px;opacity:0.64;overflow:hidden;">
        <span style="font-size:12px;font-weight:400;color:white;line-height:1.25;flex:1;">Lazer Cut Components for Presentation</span>
        <span style="font-size:10px;font-weight:400;color:white;white-space:nowrap;line-height:1.25;text-align:right;">3hrs</span>
      </div>
    </div>

    <!-- =====================================================
         CHAT PANEL – Step 2: Doc type picker
         top: 760px, centered
    ===================================================== -->
    <div style="
      position:absolute;left:50%;top:760px;transform:translateX(-50%);
      background:rgba(0,0,0,0.16);backdrop-filter:blur(12px);
      border-radius:20px;padding:8px;
      box-shadow:0 4px 18.1px rgba(0,0,0,0.12);
      display:flex;flex-direction:column;align-items:center;
    ">
      <!-- Inner dark container -->
      <div style="
        background:#141414;
        border-radius:12px 12px 12px 0;
        padding:12px 0;
        display:flex;flex-direction:column;gap:10px;
        align-items:flex-start;
      ">
        <!-- AI icon + message row -->
        <div style="display:flex;gap:10px;align-items:flex-end;padding:0 8px;">
          <div style="background:black;border-radius:12px;width:45px;height:45px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
              <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)"/>
              <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(60 13 13)"/>
              <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(120 13 13)"/>
              <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(180 13 13)"/>
              <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(240 13 13)"/>
              <ellipse cx="13" cy="6.5" rx="2.5" ry="5.5" fill="rgba(255,255,255,0.88)" transform="rotate(300 13 13)"/>
            </svg>
          </div>
          <div style="padding:8px 12px;padding-right:40px;">
            <span style="font-size:16px;font-weight:500;color:white;line-height:1.25;white-space:nowrap;">What are we drafting?...</span>
          </div>
        </div>
        <!-- Doc type icon buttons -->
        <div style="display:flex;gap:10px;align-items:center;justify-content:center;padding:0 8px;width:100%;">
          <!-- Email icon -->
          <div class="doc-icon-btn">
            <svg width="31" height="21" viewBox="0 0 31 21" fill="none">
              <rect x="1" y="1" width="29" height="19" rx="4" stroke="white" stroke-width="1.5"/>
              <path d="M1 6L15.5 13L30 6" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </div>
          <!-- Document icon -->
          <div class="doc-icon-btn">
            <svg width="25" height="29" viewBox="0 0 25 29" fill="none">
              <rect x="1" y="1" width="23" height="27" rx="4" stroke="white" stroke-width="1.5"/>
              <line x1="5" y1="9" x2="19" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="5" y1="14" x2="19" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="5" y1="19" x2="14" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Input row -->
      <div style="display:flex;align-items:stretch;width:100%;">
        <div style="position:relative;width:45px;height:45px;flex-shrink:0;background:#141414;">
          <div style="
            position:absolute;inset:0;background:#7c889a;border-radius:0 12px 0 0;
            display:flex;align-items:center;justify-content:center;padding:8px 12px;
          ">
            <img src="https://www.figma.com/api/mcp/asset/c21b3043-e6e5-4509-a475-b2e8ea6e12fc" alt="" style="width:100%;aspect-ratio:18/24;object-fit:contain;"/>
          </div>
        </div>
        <div style="background:#141414;flex:1;border-radius:0 0 12px 12px;padding:4px;display:flex;align-items:center;">
          <div style="background:rgba(255,255,255,0.08);flex:1;height:100%;border-radius:8px;padding:8px 24px;display:flex;align-items:center;">
            <span style="font-size:16px;font-weight:500;color:rgba(255,255,255,0.64);line-height:1.25;">Ask...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Vignette -->
    <div class="vignette"></div>
  </div>
</div>
<script>
  function scaleScreen() {
    const s = document.getElementById('screen');
    const w = s.parentElement;
    const scale = Math.min((w.clientWidth - 48) / 1440, (w.clientHeight - 48) / 1024, 1);
    s.style.transform = `scale(${scale})`;
    s.style.transformOrigin = 'top center';
    w.style.alignItems = (1024 * scale < w.clientHeight - 48) ? 'center' : 'flex-start';
  }
  scaleScreen();
  window.addEventListener('resize', scaleScreen);
</script>
</body>
</html>
